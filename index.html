<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>投稿管理后台 - 智能数据版</title>
<style>
*{box-sizing: border-box; margin: 0; padding: 0;}
body{font-family:"Segoe UI", Microsoft YaHei, sans-serif; background:#f0f2f5; padding:30px; color: #334155;}
.container {max-width: 1200px; margin: 0 auto;}
h1, h2{text-align:center; font-weight: 700;}
h1 {margin-bottom: 20px; color: #1e293b;}
h2{margin-top: 40px; color: #1e293b; border-top: 2px dashed #cbd5e1; padding-top: 25px; padding-bottom: 15px;}

/* 顶部导航与看板 */
.top{display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;}
.dashboard {display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px;}
.stat-card {background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-left: 5px solid #2563eb;}
.stat-card.orange {border-left-color: #f97316;}
.stat-card.green {border-left-color: #10b981;}
.stat-card h3 {font-size: 0.9rem; color: #64748b; text-transform: uppercase; margin-bottom: 5px;}
.stat-card p {font-size: 1.8rem; font-weight: bold; color: #0f172a;}

/* 数据分析双栏布局 */
.analytics-grid {display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;}
.analytics-box {background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);}
.analytics-box h3 {margin-bottom: 15px; font-size: 1.1rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px;}

/* 列表条目与表单 */
.post{background:#fff; padding:20px; margin-bottom:15px; border-radius:12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: 0.2s;}
.post:hover {box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);}
.tag {display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; margin-right: 5px;}
.tag-user {background: #ffe4e6; color: #e11d48;}
.tag-sub {background: #dbeafe; color: #1e40af;}

button{padding:8px 14px; border:none; border-radius:8px; cursor:pointer; margin-top:8px; margin-right:5px; font-weight: bold; transition: 0.2s;}
button:hover {opacity: 0.9; transform: translateY(-1px);}
.add{background:#10b981; color:#fff}
.del{background:#ef4444; color:#fff}
.revoke{background:#f59e0b; color:#fff}

input{padding:6px 10px; margin: 4px 0; border-radius:6px; border:1px solid #cbd5e1; width:180px; font-family: inherit;}
input:focus {outline: 2px solid #3b82f6;}

/* 简易可视化条形图 */
.bar-row {display: flex; align-items: center; margin-bottom: 8px; font-size: 0.9rem;}
.bar-label {width: 80px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;}
.bar-track {flex-grow: 1; background: #f1f5f9; height: 12px; border-radius: 6px; margin: 0 10px; overflow: hidden;}
.bar-fill {background: linear-gradient(90deg, #3b82f6, #06b6d4); height: 100%; border-radius: 6px;}
.bar-count {width: 40px; text-align: right; font-weight: bold; color: #475569;}
</style>
</head>
<body>

<div class="container">
    <div class="top">
        <h1 style="text-align: left; margin: 0;">📊 博物馆高阶管理后台</h1>
        <button onclick="openMain()" style="background:#2563eb; color:white; padding: 10px 16px; border-radius: 8px;">🌐 前往主展馆网页</button>
    </div>

    <div class="dashboard">
        <div class="stat-card orange">
            <h3>📥 待审核投稿</h3>
            <p id="cnt-submit">0条</p>
        </div>
        <div class="stat-card">
            <h3>📜 馆藏语录总数</h3>
            <p id="cnt-approved">0条</p>
        </div>
        <div class="stat-card green">
            <h3>🎓 参与学子总数</h3>
            <p id="cnt-users">0人</p>
        </div>
    </div>

    <div class="analytics-grid">
        <div class="analytics-box">
            <h3>👨‍🏫 老师被投稿频次排行 (Top 5)</h3>
            <div id="teacher-rank">暂无统计数据</div>
        </div>
        <div class="analytics-box">
            <h3>📚 各科目语录热度分布</h3>
            <div id="subject-chart">暂无统计数据</div>
        </div>
    </div>

    <h2>📥 待审批的新同学投稿</h2>
    <div id="list"></div>

    <h2>✅ 已经公开发布的口头禅藏品</h2>
    <div id="approvedList"></div>
</div>

<script>
let submissions = [];
let quotes = JSON.parse(localStorage.getItem("quotes")) || {};

function save(){
  localStorage.setItem("submissions", JSON.stringify(submissions));
  localStorage.setItem("quotes", JSON.stringify(quotes));
}

// 核心：处理并统计后期所需的数据
function updateAnalytics() {
    let teacherCount = {};
    let subjectCount = {};
    let uniqueUsers = new Set();

    // 统计待审核池中的数据
    submissions.forEach(s => {
        if (s.teacher) teacherCount[s.teacher] = (teacherCount[s.teacher] || 0) + 1;
        if (s.subject) subjectCount[s.subject] = (subjectCount[s.subject] || 0) + 1;
        // 假设我们在前端投稿区加入了用户名输入框（如果没有，默认按匿名计）
        if (s.username) uniqueUsers.add(s.username);
    });

    // 统计已通过主馆的数据
    let approvedTotal = 0;
    Object.keys(quotes).forEach(sub => {
        quotes[sub].forEach(q => {
            approvedTotal++;
            if (q.teacher) teacherCount[q.teacher] = (teacherCount[q.teacher] || 0) + 1;
            subjectCount[sub] = (subjectCount[sub] || 0) + 1;
            if (q.username) uniqueUsers.add(q.username);
        });
    });

    // 更新看板数字
    document.getElementById("cnt-submit").innerText = submissions.length + " 条";
    document.getElementById("cnt-approved").innerText = approvedTotal + " 条";
    document.getElementById("cnt-users").innerText = Math.max(uniqueUsers.size, 1) + " 人";

    // 渲染老师排行 (前5名)
    let sortedTeachers = Object.keys(teacherCount).map(name => ({name, count: teacherCount[name]})).sort((a,b) => b.count - a.count);
    const teacherRankBox = document.getElementById("teacher-rank");
    if(sortedTeachers.length === 0) {
        teacherRankBox.innerHTML = "<p style='color:#94a3b8;'>暂无统计</p>";
    } else {
        let html = "";
        sortedTeachers.slice(0, 5).forEach((t, index) => {
            html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:0.95rem;">
                <span>🔥 <b>No.${index+1}</b> ${t.name}</span>
                <span style="color:#2563eb; font-weight:bold;">被投 ${t.count} 次</span>
            </div>`;
        });
        teacherRankBox.innerHTML = html;
    }

    // 渲染科目条形图
    const subjectChartBox = document.getElementById("subject-chart");
    let sortedSubs = Object.keys(subjectCount).map(sub => ({sub, count: subjectCount[sub]})).sort((a,b) => b.count - a.count);
    if(sortedSubs.length === 0) {
        subjectChartBox.innerHTML = "<p style='color:#94a3b8;'>暂无统计</p>";
    } else {
        let maxCount = Math.max(...sortedSubs.map(item => item.count));
        let chartHtml = "";
        sortedSubs.slice(0, 5).forEach(item => {
            let percentage = (item.count / maxCount) * 100;
            chartHtml += `
                <div class="bar-row">
                    <div class="bar-label"><b>${item.sub}</b></div>
                    <div class="bar-track"><div class="bar-fill" style="width: ${percentage}%"></div></div>
                    <div class="bar-count">${item.count}条</div>
                </div>
            `;
        });
        subjectChartBox.innerHTML = chartHtml;
    }
}

// 渲染全部列表
function render(){
  submissions = JSON.parse(localStorage.getItem("submissions")) || [];
  quotes = JSON.parse(localStorage.getItem("quotes")) || {};
  
  updateAnalytics();

  const list = document.getElementById("list");
  const approvedList = document.getElementById("approvedList");
  
  if(document.activeElement && document.activeElement.tagName === "INPUT") {
     return; 
  }

  // 1. 渲染待审核列表
  list.innerHTML = "";
  if(submissions.length === 0){ 
    list.innerHTML = "<p style='text-align:center;color:#64748b;padding: 20px;'>🎉 暂无待审核的投稿，管理员可以去休息啦！</p>"; 
  } else {
    submissions.forEach((s, i)=>{
      let userDisplay = s.username ? `👤 投稿学子: ${s.username}` : `👤 匿名同学`;
      list.innerHTML += `<div class="post">
        <div style="margin-bottom: 10px;"><span class="tag tag-user">${userDisplay}</span></div>
        <p><b>投稿语录：</b><span style="color:#1e3a8a;font-size:1.15rem;display:block;margin:8px 0;">"${s.text}"</span></p>
        <div style="background: #f8fafc; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
            科目：<input id="sub-${i}" value="${s.subject || ''}" placeholder="如：华语、数学"> | 
            老师：<input id="tea-${i}" value="${s.teacher || ''}" placeholder="老师名字"> | 
            绰号：<input id="nick-${i}" value="${s.nick || ''}" placeholder="老师绰号">
        </div>
        <button class="add" onclick="approve(${i})">➕ 审批通过并发布</button>
        <button class="del" onclick="removePost(${i})">🗑 拒绝并删除</button>
      </div>`;
    });
  }

  // 2. 渲染已通过（可撤回）列表
  approvedList.innerHTML = "";
  let hasApproved = false;

  Object.keys(quotes).forEach(sub => {
    (quotes[sub] || []).forEach((q, i) => {
      hasApproved = true;
      let fromUser = q.username ? ` (由 ${q.username} 投递)` : " (匿名投递)";
      approvedList.innerHTML += `<div class="post" style="border-left: 5px solid #10b981;">
        <p><b>口头禅内容：</b><span style="color:#111827;font-size:1.1rem;">"${q.text}"</span></p>
        <p style="color:#64748b; font-size:0.95rem; margin: 8px 0;">
          所属板块：<span class="tag tag-sub">${sub}</span> | 授课导师：<b>${q.teacher} (${q.nick})</b> ${fromUser}
        </p>
        <div style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 10px;">数据热度： 👍 ${q.likes} 赞 | 🔄 ${q.shares} 分享</div>
        <button class="revoke" onclick="revokePost('${sub}', ${i})">↩️ 撤回整改</button>
        <button class="del" onclick="removeApprovedPost('${sub}', ${i})">🗑 彻底销毁</button>
      </div>`;
    });
  });

  if(!hasApproved){
    approvedList.innerHTML = "<p style='text-align:center;color:#64748b;padding: 20px;'>📭 主网站目前没有任何内容</p>";
  }
}

// 审核通过并移入主网站对应分类
function approve(i){
  const sub = document.getElementById(`sub-${i}`).value.trim();
  const name = document.getElementById(`tea-${i}`).value.trim() || "匿名老师";
  const nick = document.getElementById(`nick-${i}`).value.trim() || "无绰号";
  
  if(!sub){ alert("请务必填写对应的科目！"); return; }

  if(!quotes[sub]) quotes[sub] = [];
  
  quotes[sub].push({
    teacher: name,
    nick: nick,
    text: submissions[i].text,
    username: submissions[i].username || "", // 保存投稿人名字
    likes: 0,
    shares: 0
  });

  submissions.splice(i, 1);
  save();
  render();
  alert("审核成功！该口头禅已在主网站同步展出。");
}

// 撤回功能
function revokePost(sub, index){
  if(confirm("确定要把这条口头禅从主网站撤回吗？它将重新变为“待审核”状态。")){
    const target = quotes[sub][index];
    
    submissions.push({
      text: target.text,
      subject: sub,
      teacher: target.teacher,
      nick: target.nick,
      username: target.username || "" // 撤回时保留原投稿者
    });

    quotes[sub].splice(index, 1);
    if(quotes[sub].length === 0) delete quotes[sub];

    save();
    render();
    alert("已成功撤回！");
  }
}

// 从主站直接彻底删除
function removeApprovedPost(sub, index){
  if(confirm("确定要将这条已发布的语录从主站【彻底删除】吗？不可恢复！")){
    quotes[sub].splice(index, 1);
    if(quotes[sub].length === 0) delete quotes[sub];
    
    save();
    render();
    alert("已彻底删除！");
  }
}

// 拒绝/删除未审核的投稿
function removePost(i){
  if(confirm("确定要删除这条投稿吗？不可恢复。")){
    submissions.splice(i, 1);
    save();
    render();
  }
}

function openMain(){ 
  window.open("index.html", "_blank"); 
}

// 初始化
render();

// 监听跨窗体
window.addEventListener('storage', function(event){
  if(event.key === "submissions" || event.key === "quotes"){
    render();
  }
});

// 每 2 秒安全刷新一次
setInterval(()=>{ render(); }, 2000);
</script>
</body>
</html>
